apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:0.0.1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PDF_SERVICE_URL
              value: http://pdf-converter-service:8081
            - name: DOWNLOAD_SERVICE_URL
              value: http://download-service:8082
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080